<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose a section · Housebuilder Portal · New Home Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  /* Cross-document View Transition: morph the buttons into the portal's tabs.
     Chrome/Edge animate this automatically; other browsers just navigate. */
  @view-transition { navigation: auto; }

  :root{
    --nhs-dk:#075F50; --nhs-dark:#053f34; --nhs-mid:#4A6B5E; --nhs-soft:#6B9080;
    --nhs-sage:#C9D5CB; --nhs-pale:#EAF4EF; --nhs-pale-2:#F4F9F6; --border:#DDE5E1;
    --gold:#C9A84C; --ink:#1F3D34; --ink-soft:#5A6B7C; --muted:#5A6B7C;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(1100px 560px at 12% -8%, rgba(107,144,128,0.18), transparent 60%),
      radial-gradient(900px 520px at 100% 108%, rgba(201,168,76,0.10), transparent 55%),
      linear-gradient(160deg,#F4F9F6 0%, #EAF4EF 100%);
  }

  /* ── Header ── */
  header.appbar{
    background:var(--nhs-dk);color:#fff;padding:13px 28px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  .brand{display:flex;align-items:center;gap:12px}
  .nhs-box{width:40px;height:40px;border-radius:8px;background:#fff;color:var(--nhs-dk);display:grid;place-items:center;font-weight:900;font-size:14px}
  .brand .bn{font-size:14px;font-weight:800;line-height:1.2}
  .brand .bs{font-size:10.5px;opacity:0.8;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;margin-top:2px}
  .appbar .right{display:flex;align-items:center;gap:10px}
  .appbar .right a{color:#EAF4EF;text-decoration:none;font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:8px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);display:inline-flex;align-items:center;gap:6px}
  .appbar .right a:hover{background:rgba(255,255,255,0.22)}
  .appbar .right a svg{width:13px;height:13px}

  /* ── Chooser ── */
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 64px;text-align:center}
  .welcome{font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--nhs-soft);margin-bottom:8px}
  h1{font-size:30px;font-weight:800;letter-spacing:-0.015em;margin:0 0 8px}
  .sub{font-size:14px;color:var(--ink-soft);margin:0 0 38px;max-width:520px}

  .choices{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:920px}
  .choice{
    width:200px;min-height:172px;background:#fff;border:1.5px solid var(--border);border-radius:18px;
    padding:24px 18px;text-decoration:none;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
    box-shadow:0 6px 18px rgba(15,23,42,0.05);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    cursor:pointer;position:relative;
  }
  .choice:hover{transform:translateY(-5px);box-shadow:0 16px 34px rgba(7,95,80,0.16);border-color:var(--nhs-soft)}
  .choice .ico{
    width:54px;height:54px;border-radius:14px;background:var(--nhs-pale);color:var(--nhs-dk);
    display:grid;place-items:center;transition:background .18s, color .18s;
  }
  .choice:hover .ico{background:var(--nhs-dk);color:#fff}
  .choice .ico svg{width:26px;height:26px}
  .choice .ico .pound{font-size:26px;font-weight:800;line-height:1}
  .choice .label{font-size:16px;font-weight:800;letter-spacing:-0.01em}
  .choice .count{
    font-size:12px;font-weight:700;color:var(--nhs-dk);background:var(--nhs-pale);
    padding:2px 11px;border-radius:20px;
  }
  .choice .go{
    position:absolute;top:13px;right:13px;width:22px;height:22px;border-radius:50%;
    background:var(--nhs-pale);color:var(--nhs-dk);display:grid;place-items:center;opacity:0;transform:translateX(-4px);
    transition:opacity .18s, transform .18s, background .18s, color .18s;
  }
  .choice:hover .go{opacity:1;transform:translateX(0);background:var(--nhs-dk);color:#fff}
  .choice .go svg{width:13px;height:13px}

  /* greyed-out options — scheduled for a later development phase */
  .choice.soon{background:#F3F6F4;border-color:#E6EBE8;box-shadow:none;cursor:not-allowed;pointer-events:none}
  .choice.soon .ico{background:#E9EEEB;color:#A7B3AD}
  .choice.soon .label{color:#8B968F}
  .choice.soon .pound{color:#A7B3AD}
  .choice.soon .soon-badge{
    font-size:10px;font-weight:700;color:#7E8A84;background:#E9EEEB;
    padding:3px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em;
  }

  /* staggered entrance */
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .choice{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  .choice:nth-child(1){animation-delay:.05s}
  .choice:nth-child(2){animation-delay:.12s}
  .choice:nth-child(3){animation-delay:.19s}
  .choice:nth-child(4){animation-delay:.26s}
  .welcome,h1,.sub{animation:rise .5s ease both}

  /* the four buttons carry the names that the portal's tabs also use, so the
     browser morphs each button into its matching tab during navigation */
  .choice.v-valuations{view-transition-name:vt-valuations}
  .choice.v-market{view-transition-name:vt-market}
  .choice.v-offers{view-transition-name:vt-offers}
  .choice.v-progression{view-transition-name:vt-progression}

  @media (max-width:520px){ .choice{width:calc(50% - 10px)} h1{font-size:24px} }
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <div class="nhs-box">NHS</div>
    <div>
      <div class="bn">New Home Solutions</div>
      <div class="bs">Housebuilder Portal</div>
    </div>
  </div>
  <div class="right">
    <a href="nhs-portals-hub.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      NHS Portal Hub
    </a>
    <a href="housebuilder.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</header>

<main>
  <div class="welcome">Wain Homes — North West</div>
  <h1>Where would you like to start?</h1>
  <p class="sub">Choose a section to open your applications. We'll take you straight to that view.</p>

  <div class="choices">
    <a class="choice v-valuations" href="housebuilder-portal?tab=valuations">
      <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="9 18 15 12 9 6"/></svg></span>
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11H3v10h6zM21 3h-6v18h6zM15 7H9v14h6z"/></svg></span>
      <span class="label">Valuations</span>
      <span class="count">3 active</span>
    </a>
    <a class="choice v-market soon" aria-disabled="true" title="Scheduled for the next development phase">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="label">On Market</span>
      <span class="soon-badge">Coming soon</span>
    </a>
    <a class="choice v-offers soon" aria-disabled="true" title="Scheduled for the next development phase">
      <span class="ico"><span class="pound">£</span></span>
      <span class="label">Offers</span>
      <span class="soon-badge">Coming soon</span>
    </a>
    <a class="choice v-progression soon" aria-disabled="true" title="Scheduled for the next development phase">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
      <span class="label">Sales Progression</span>
      <span class="soon-badge">Coming soon</span>
    </a>
  </div>
</main>

</body>
</html>
